{{- if .Values.secrets.createCommonSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.commonSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "alert-service.labels" . | nindent 4 }}
    app.kubernetes.io/component: shared-secrets
type: Opaque
data:
  # PostgreSQL - used by alert-service (DB_USER, DB_PASSWORD) and Bitnami postgres chart
  db-username: {{ .Values.secrets.dbUsername | b64enc | quote }}
  db-password: {{ .Values.secrets.dbPassword | b64enc | quote }}
  postgres-password: {{ .Values.secrets.postgresPassword | default .Values.secrets.dbPassword | b64enc | quote }}
  password: {{ .Values.secrets.dbPassword | b64enc | quote }}
  # Elasticsearch - for future use if auth is enabled
  elasticsearch-username: {{ .Values.secrets.elasticsearchUsername | default "elastic" | b64enc | quote }}
  elasticsearch-password: {{ .Values.secrets.elasticsearchPassword | default .Values.secrets.dbPassword | b64enc | quote }}
{{- end }}
