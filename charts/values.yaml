replicaCount: 1

image:
  repository: ghcr.io/keresifon/ai-monitoring-alert-service
  pullPolicy: IfNotPresent
  tag: "1.0.2"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Use default SA (chart has no serviceaccount template). Set create+template if custom SA needed.
  create: false
  annotations: {}
  name: ""

service:
  type: ClusterIP
  port: 8083

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 50m
    memory: 256Mi

env:
  SPRING_PROFILES_ACTIVE: kubernetes
  # update = create missing tables on startup; use validate after schema is managed by migrations
  SPRING_JPA_HIBERNATE_DDL_AUTO: update

database:
  host: postgres
  port: 5432
  name: ai_monitoring
  schema: alert_service

elasticsearch:
  host: elasticsearch
  port: 9200

secrets:
  # Common secret name - all services (alert-service, postgres, elasticsearch) reference this
  commonSecretName: ai-monitoring-secrets
  # Set to false when secret is created manually - avoids overwriting with empty values
  createCommonSecret: false
  dbUsername: "admin"
  dbPassword: ""  # REQUIRED: set via --set secrets.dbPassword=<secure-password>
  # postgres-password for Bitnami postgres superuser (uses dbPassword if not set)
  postgresPassword: ""
  # Elasticsearch credentials (optional; used if ES security enabled)
  elasticsearchUsername: "elastic"
  elasticsearchPassword: ""

startupProbe:
  # Give Spring Boot up to ~3 min to start before failing
  httpGet:
    path: /actuator/health/liveness
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 24

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: http
  initialDelaySeconds: 0  # startupProbe runs first
  periodSeconds: 15
  timeoutSeconds: 10
  failureThreshold: 5

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: http
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6

openshift:
  enabled: false
  route:
    enabled: true
    host: ""
    annotations:
      haproxy.router.openshift.io/timeout: 60s
    tls:
      enabled: true
      termination: edge
      insecureEdgeTerminationPolicy: Redirect
      destinationCACertificate: ""
