replicaCount: 2

image:
  repository: ghcr.io/keresifon/ai-monitoring-alert-service
  pullPolicy: IfNotPresent
  tag: "1.0.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Use default SA (chart has no serviceaccount template). Set create+template if custom SA needed.
  create: false
  annotations: {}
  name: ""

service:
  type: ClusterIP
  port: 8083

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

env:
  SPRING_PROFILES_ACTIVE: kubernetes

database:
  host: postgres
  port: 5432
  name: ai_monitoring
  schema: alert_service

elasticsearch:
  host: elasticsearch
  port: 9200

secrets:
  dbUsername: ""
  dbPassword: ""

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: http
  initialDelaySeconds: 90
  periodSeconds: 15
  timeoutSeconds: 10
  failureThreshold: 5

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: http
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
